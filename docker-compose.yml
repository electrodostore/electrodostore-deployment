services:
  config-server:
    build: ../config-server
    mem_limit: 512m
    expose:
      - "8888"
    environment:
      GITHUB_URL: ${GITHUB_URL}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    networks:
      - electrodostore-network


  eureka-server:
    build: ../eureka-server
    mem_limit: 512m
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy    
    networks:
      - electrodostore-network


  producto-service:
    build: ../producto-service
    mem_limit: 512m
    expose:
      - "8181"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_URL: ${EUREKA_URL}
      DB_USERNAME: ${PRODUCTOS_DB_USER}
      DB_PASSWORD: ${PRODUCTOS_DB_PASSWORD}
      DB_URL: ${PRODUCTOS_DB_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      producto-db:
        condition: service_healthy
    networks:
      - electrodostore-network


  producto-db:
    image: mysql:8.0.33 
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${PRODUCTOS_DB_ROOT_PASSWORD}
      MYSQL_USER: ${PRODUCTOS_DB_USER}
      MYSQL_PASSWORD: ${PRODUCTOS_DB_PASSWORD}
      MYSQL_DATABASE: ${PRODUCTOS_DB_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - electrodostore-network
    volumes:
      - productos_db_data:/var/lib/mysql    


  cliente-service:
    build: ../cliente-service
    mem_limit: 512m
    expose:
      - "8080"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_URL: ${EUREKA_URL}
      DB_USERNAME: ${CLIENTES_DB_USER}
      DB_PASSWORD: ${CLIENTES_DB_PASSWORD}
      DB_URL: ${CLIENTES_DB_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      cliente-db:
        condition: service_healthy
    networks:
      - electrodostore-network


  cliente-db:
    image: mysql:8.0.33 
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${CLIENTES_DB_ROOT_PASSWORD}
      MYSQL_USER: ${CLIENTES_DB_USER}
      MYSQL_PASSWORD: ${CLIENTES_DB_PASSWORD}
      MYSQL_DATABASE: ${CLIENTES_DB_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - electrodostore-network
    volumes:
      - clientes_db_data:/var/lib/mysql


  carrito-service:
    build: ../carrito-service
    mem_limit: 512m
    expose:
      - "8282"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_URL: ${EUREKA_URL}
      DB_USERNAME: ${CARRITOS_DB_USER}
      DB_PASSWORD: ${CARRITOS_DB_PASSWORD}
      DB_URL: ${CARRITOS_DB_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8282/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      carrito-db:
        condition: service_healthy
    networks:
      - electrodostore-network


  carrito-db:
    image: mysql:8.0.33 
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${CARRITOS_DB_ROOT_PASSWORD}
      MYSQL_USER: ${CARRITOS_DB_USER}
      MYSQL_PASSWORD: ${CARRITOS_DB_PASSWORD}
      MYSQL_DATABASE: ${CARRITOS_DB_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - electrodostore-network
    volumes:
      - carritos_db_data:/var/lib/mysql



  venta-service:
    build: ../venta-service
    mem_limit: 512m
    expose:
      - "9191"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_URL: ${EUREKA_URL}
      DB_USERNAME: ${VENTAS_DB_USER}
      DB_PASSWORD: ${VENTAS_DB_PASSWORD}
      DB_URL: ${VENTAS_DB_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9191/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      venta-db:
        condition: service_healthy
    networks:
      - electrodostore-network



  venta-db:
    image: mysql:8.0.33 
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${VENTAS_DB_ROOT_PASSWORD}
      MYSQL_USER: ${VENTAS_DB_USER}
      MYSQL_PASSWORD: ${VENTAS_DB_PASSWORD}
      MYSQL_DATABASE: ${VENTAS_DB_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - electrodostore-network
    volumes:
      - ventas_db_data:/var/lib/mysql



  api-gateway:
    build: ../api-gateway
    mem_limit: 512m
    ports:
      - "9090:9090"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_URL: ${EUREKA_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s     
      timeout: 10s    
      retries: 5        
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      producto-service:
        condition: service_healthy
      cliente-service:
        condition: service_healthy
      carrito-service:
        condition: service_healthy
      venta-service:
        condition: service_healthy
    networks:
      - electrodostore-network

networks:
  electrodostore-network:
    driver: bridge


volumes:
  productos_db_data:
  clientes_db_data:
  carritos_db_data:
  ventas_db_data:
  

